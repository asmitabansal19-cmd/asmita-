<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery - Nava Fragrances</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="container">
            <div class="logo">
                <img src="assets/logo.png" alt="Nava Fragrances Logo" class="logo-img">
            </div>
            <nav class="navbar">
                <a href="index.html" class="nav-link">HOME</a>
                <a href="about.html" class="nav-link">ABOUT</a>
                <a href="gallery.html" class="nav-link active">GALLERY</a>
                <div class="nav-dropdown">
                    <a href="products.html" class="nav-link">PRODUCTS ▼</a>
                </div>
                <a href="packages.html" class="nav-link">PACKAGES</a>
                <a href="products.html" class="nav-link">SCENTED PRODUCTS</a>
                <div class="nav-dropdown">
                    <a href="#more" class="nav-link">MORE ▼</a>
                </div>
                <a href="#profile" class="nav-link profile-icon">👤</a>
            </nav>
        </div>
    </header>

    <!-- Gallery Section -->
    <section class="gallery-section">
        <h1>GALLERY</h1>
        <div class="gallery-header-divider"></div>
        
        <div class="gallery-grid">
            <div class="gallery-item">
                <img src="assets/gallery-flower.jpg" alt="Decorative Flower Bowl">
                <div class="gallery-overlay">
                    <p>Decorative Flower Bowl</p>
                </div>
            </div>
            <div class="gallery-item">
                <img src="assets/gallery-diffuser.jpg" alt="Reed Diffuser">
                <div class="gallery-overlay">
                    <p>Reed Diffuser</p>
                </div>
            </div>
            <div class="gallery-item">
                <img src="assets/gallery-lemongrass.jpg" alt="Lemongrass Diffuser">
                <div class="gallery-overlay">
                    <p>Lemongrass Diffuser</p>
                </div>
            </div>
            <div class="gallery-item">
                <img src="assets/gallery-gift-set.jpg" alt="Birthday Gift Set">
                <div class="gallery-overlay">
                    <p>Birthday Gift Set</p>
                </div>
            </div>
            <div class="gallery-item">
                <img src="assets/gallery-candles-1.jpg" alt="Candle Collection">
                <div class="gallery-overlay">
                    <p>Candle Collection</p>
                </div>
            </div>
            <div class="gallery-item">
                <img src="assets/gallery-body-products.jpg" alt="Body Wash Products">
                <div class="gallery-overlay">
                    <p>Body Wash Collection</p>
                </div>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <p>&copy; 2024 Nava Fragrances. All rights reserved.</p>
            <div class="social-links">
                <a href="#" class="social-icon">Instagram</a>
                <a href="#" class="social-icon">Facebook</a>
                <a href="#" class="social-icon">WhatsApp</a>
            </div>
        </div>
    </footer>
</body>
</html>
